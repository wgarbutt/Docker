---
version: "3.4"
services:
###############################################################
# Dashy
###############################################################

  dashy:
    image: lissy93/dashy
    container_name: dashy
    volumes:
      - /container_data/dashy/dashy-conf.yml:/app/user-data/conf.yml
    ports:
      - 8090:8080
    networks:
      - reverse_proxy    
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashy.tls=true"
      - "traefik.http.routers.dashy.entrypoints=websecure"
      - "traefik.http.routers.dashy.rule=Host(`home.willg.link`)"


###############################################################
# Immich
###############################################################
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    depends_on:
      - immich-redis
      - immich-database
    environment:
      - DB_HOSTNAME=immich-database
      - DB_USERNAME=${DB_Username}
      - DB_PASSWORD=${DB_Password}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    volumes:
      - immich_library:/usr/src/app/upload
    ports:
      - 2283:2283
    networks:
      - reverse_proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.rule=Host(`photos.willg.link`)"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
      - "traefik.http.routers.immich.tls.certresolver=letsencryptresolver"
  

  immich-microservices:
    container_name: immich_microservices
    image: ghcr.io/immich-app/immich-server:release
    command: ["start.sh", "microservices"]
    depends_on:
      - immich-redis
      - immich-database
    environment:
      - DB_HOSTNAME=immich-database
      - DB_USERNAME=${DB_Username}
      - DB_PASSWORD=${DB_Password}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    volumes:
      - immich_library:/usr/src/app/upload
    networks:
      - reverse_proxy
    restart: unless-stopped

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    networks:
      - reverse_proxy
    restart: unless-stopped

  immich-redis:
    container_name: immich_redis
    image: redis:7
    networks:
      - reverse_proxy
    restart: unless-stopped

  immich-database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      - POSTGRES_PASSWORD=${DB_Password}
      - POSTGRES_DB=immich
    volumes:
      - immich_postgres:/var/lib/postgresql/data
    networks:
      - reverse_proxy
    restart: unless-stopped
    healthcheck:
      interval: 5m
      start_period: 30s
      test: pg_isready --dbname='immich' --username=${DB_Username} || exit 1

###############################################################
# AudioBookShelf
###############################################################
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    ports:
      - "13378:13378"
    volumes:
      - audiobookshelfconfig:/config
      - audiobookshelfmetadata:/metadata
      - audiobookshelfaudiobooks:/audiobooks
      - audiobookshelfpodcasts:/podcasts
    restart: unless-stopped
    networks:
      - reverse_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audiobookshelf.tls=true"
      - "traefik.http.routers.audiobookshelf.entrypoints=websecure"
      - "traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.willg.link`)"
      - "traefik.http.services.audiobookshelf.loadbalancer.server.port=13378"

###############################################################
# Zigbee2mqtt
###############################################################

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: zigbee2mqtt
    ports:
      - "8080:8080"
    volumes:
      - zigbee2mqtt:/app/data
    restart: unless-stopped
    networks:
      - reverse_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zigbee2mqtt.tls=true"
      - "traefik.http.routers.zigbee2mqtt.entrypoints=websecure"
      - "traefik.http.routers.zigbee2mqtt.rule=Host(`zigbee2mqtt.willg.link`)"
      - "traefik.http.services.zigbee2mqtt.loadbalancer.server.port=8080"

###############################################################
# Minecraft
###############################################################

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      MEMORY: "4G"
      TYPE: "VANILLA"
      VERSION: "LATEST"
    volumes:
      - minecraft:/data
    networks:
      - reverse_proxy
    restart: unless-stopped


###############################################################
# Media Stack
###############################################################

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=NZ
    volumes:
      - sabnzbdconfig:/config
      - downloads:/downloads 
    ports:
      - 8079:8079
    networks:
      - reverse_proxy
    restart: always

  sonarr:
    container_name: sonarr
    image: linuxserver/sonarr:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=NZ 
    volumes:
      - sonarrconfig:/config 
      - tv:/TV 
      - downloads:/downloads 
    ports:
      - 8989:8989
    networks:
      - reverse_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.tls=true"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.willg.link`)"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"

  radarr:
    container_name: radarr
    image: linuxserver/radarr:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=NZ 
    volumes:
      - radarrconfig:/config 
      - movies:/Movies 
      - downloads:/downloads 
    ports:
      - 7878:7878
    networks:
      - reverse_proxy

  plex:
    container_name: plex
    image: plexinc/pms-docker:latest
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=NZ 
    volumes:
      - plexconfig:/config 
      - plexconfig:/transcode 
      - tv:/tv 
      - movies:/movies 
    ports:
      - 32400:32400 
      - 5353:5353/udp 
      - 8324:8324 
      - 32410:32410/udp 
      - 32412:32412/udp 
      - 32413:32413/udp 
      - 32414:32414/udp 
      - 32469:32469
    networks:
      - reverse_proxy

###############################################################
# Portainer
###############################################################
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9443:9443"
      - "9000:9000"
    networks:
      - reverse_proxy    
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "portainer_data:/data"
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.rule=Host(`portainer.willg.link`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

###############################################################
# Traefik
###############################################################

  traefik:
    container_name: traefik
    image: traefik:latest
    restart: always
    command:
      - --entrypoints.web.address=:80
      - --api
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls.domains[0].main=${DOMAINNAME}
      - --entrypoints.websecure.http.tls.domains[0].sans=*.${DOMAINNAME}
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false 
      - --certificatesresolvers.letsencryptresolver.acme.dnschallenge=true
      - --certificatesresolvers.letsencryptresolver.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencryptresolver.acme.dnschallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesresolvers.letsencryptresolver.acme.dnschallenge.delayBeforeCheck=30
      - --certificatesresolvers.letsencryptresolver.acme.email=${EMAIL}
      - --certificatesresolvers.letsencryptresolver.acme.storage=/acme.json
      - --log.level=info
      - --providers.file.filename=/dynamic.yml
    ports:
      - 80:80
      - 443:443
    networks:
      - reverse_proxy
    environment:
      - CF_API_EMAIL=${EMAIL}
      - CF_DNS_API_TOKEN=${KEY}
      - CF_ZONE_ID=${ZONEID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro 
      - ${TRAEFIK_DIR}/acme.json:/acme.json 
      - /container_data/traefik/dynamic.yml:/dynamic.yml:ro
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.admin.basicauth.users=${HTTP_BASIC_USER}:${HTTP_BASIC_PWD}
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.rule=Host(`${DOMAINNAME}`)
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls=true

###############################################################
# Maintainerr
###############################################################
  maintainerr:
    image: ghcr.io/jorenn92/maintainerr:latest 
    container_name: maintainerr
    user: 1000:1000
    volumes:
      - maintainaar_config:/opt/data
    environment:
      - TZ=NZ
    networks:
      - reverse_proxy
    ports:
      - 6246:6246
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maintainerr.tls=true"
      - "traefik.http.routers.maintainerr.entrypoints=websecure"
      - "traefik.http.routers.maintainerr.rule=Host(`maintainaar.willg.link`)"
      - "traefik.http.services.maintainerr.loadbalancer.server.port=6246"

###############################################################
# Volumes
###############################################################

volumes:
  maintainaar_config:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/maintainaar'

  zigbee2mqtt:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/zigbee2mqtt'

  minecraft:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/minecraft'

  audiobookshelfconfig:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/audiobookshelf/config'

  audiobookshelfmetadata:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/audiobookshelf/metadata'

  audiobookshelfaudiobooks:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/audiobookshelf/audiobooks'

  audiobookshelfpodcasts:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/audiobookshelf/podcasts'

  docker_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data'

  downloads:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/media/Downloads'

  tv:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/media/TV'

  movies:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/media/Movies'
  
  plexconfig:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/media/plex'

  sonarrconfig:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/media/sonarr'

  radarrconfig:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/media/radarr'

  sabnzbdconfig:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/media/sabnzbd'

  portainer_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/portainer'

  immich_library:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/mnt/photos'

  immich_postgres:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/container_data/immich/postgres'

###############################################################
# Networks
###############################################################
networks:
  reverse_proxy:
    external: true