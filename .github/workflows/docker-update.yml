name: Update Docker Containers

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: self-hosted
    steps:
      - name: Change to project directory and pull changes
        run: |
          cd /container_data/Docker
          git pull origin main

      - name: Pull latest images
        run: docker compose -f /container_data/Docker/docker-compose.yml pull

      - name: Stop running containers
        run: docker compose -f /container_data/Docker/docker-compose.yml down

      - name: Start updated containers
        run: docker compose -f /container_data/Docker/docker-compose.yml up -d
